# BU-Processor Configuration
# ===========================

# API Configuration
api_key: ""
secret_key: ""

# Environment Settings
environment: "development"
debug: true
log_level: "INFO"

# Clustering Configuration per Content Type
clustering:
  legal_text:
    algorithm: "DBSCAN"
    eps: 0.3
    min_samples: 2
    metric: "cosine"
  table_heavy:
    algorithm: "AgglomerativeClustering"
    n_clusters: null
    distance_threshold: 0.7
    linkage: "average"
  technical:
    algorithm: "DBSCAN"
    eps: 0.4
    min_samples: 3
    metric: "cosine"
  narrative:
    algorithm: "AgglomerativeClustering"
    n_clusters: null
    distance_threshold: 0.6
    linkage: "ward"
  mixed:
    algorithm: "DBSCAN"
    eps: 0.45
    min_samples: 2
    metric: "cosine"

# Semantic Models Configuration
models:
  multilingual: "paraphrase-multilingual-MiniLM-L12-v2"
  german_legal: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
  fast_embedding: "paraphrase-MiniLM-L6-v2"

# Batch Processing Settings
batch_processing:
  default_batch_size: 32
  large_batch_size: 64
  small_batch_size: 16
  max_chunks_for_batching: 100

# Caching Configuration
caching:
  max_cache_size: 1000
  cache_ttl_seconds: 3600
  enable_persistent_cache: false

# Similarity Settings
similarity:
  min_similarity_threshold: 0.3
  top_similar_chunks: 3

# Content Type Weights for Deduplication
content_type_weights:
  legal_text: 1.5
  technical_spec: 1.3
  narrative: 1.0
  table: 0.8
  list: 0.7
  mixed: 1.0

# Selection Weights for Representative Selection
selection_weights:
  text_length_factor: 0.001
  heading_level_factor: 10.0
  token_count_factor: 0.1

# ML Model Configuration
ml_model:
  model_path: "bert-base-german-cased"
  sentence_transformer_model: "paraphrase-multilingual-MiniLM-L12-v2"
  max_sequence_length: 512
  confidence_threshold: 0.8
  use_gpu: true

# PDF Processing Configuration
pdf_processing:
  extraction_method: "pymupdf"
  max_pdf_size_mb: 50
  max_pdf_pages: 100
  text_cleanup: true
  min_extracted_text_length: 10
  normalize_whitespace: true
  auto_detect_language: false
  max_batch_pdf_count: 20
  fallback_chain: true
  extract_metadata: true
  cache_dir: "cache/pdf_extractions"
  enable_cache: true
  supported_extensions: [".pdf"]

# Vector Database Configuration
vector_db:
  pinecone_api_key: ""
  pinecone_environment: "us-west1-gcp-free"
  pinecone_index_name: "bu-processor"
  embedding_dimension: 384
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  max_batch_size: 100
  enable_vector_db: false

# OpenAI Configuration
openai:
  openai_api_key: ""
  openai_model: "gpt-3.5-turbo"
  max_tokens: 1000
  temperature: 0.7
  enable_chatbot: false

# Deduplication Configuration
deduplication:
  simhash_bit_size: 64
  simhash_ngram_size: 3
  similarity_threshold: 0.85
  hamming_threshold: 8
  enable_caching: true
  cache_size_limit: 10000
  enable_semantic_features: true
  min_important_word_length: 6
  min_token_length: 3
  enable_semantic_deduplication: true

# API Server Configuration
api:
  host: "0.0.0.0"
  port: 8000
  prometheus_metrics_port: 9100

# Application Metadata
app_name: "BU-Processor"
version: "3.0.0"
