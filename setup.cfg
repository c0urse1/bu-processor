# ============================================================================
# FLAKE8 CONFIGURATION FOR BU-PROCESSOR
# ============================================================================
# Python linting configuration compatible with Black formatter

[flake8]
# Maximum line length (Black default)
max-line-length = 88

# Maximum cyclomatic complexity
max-complexity = 10

# Ignore specific error codes to work with Black
extend-ignore = 
    # E203: whitespace before ':' (conflicts with Black)
    E203,
    # W503: line break before binary operator (old style)
    W503,
    # E501: line too long (handled by Black)
    E501,
    # F401: imported but unused (handled by isort)
    F401

# Directories to exclude from linting
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .env,
    build,
    dist,
    *.egg-info,
    .pytest_cache,
    .mypy_cache,
    migrations,
    .tox

# File patterns to include
filename = *.py

# Show source code for each error
show-source = True

# Count errors and warnings
count = True

# Enable specific plugins if available
select = 
    # Pyflakes errors  
    F,
    # Pycodestyle errors
    E,
    # Pycodestyle warnings
    W,
    # McCabe complexity
    C
