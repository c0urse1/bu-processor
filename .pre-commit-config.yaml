# ============================================================================
# PRE-COMMIT CONFIGURATION FOR BU-PROCESSOR
# ============================================================================
# Automatic code quality checks before each commit
# Setup: pip install pre-commit && pre-commit install

repos:
  # BLACK - Python code formatter
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        args: ["--line-length=88"]
        language_version: python3

  # ISORT - Import statement organizer
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile=black", "--multi-line=3"]

  # FLAKE8 - Python linter for style guide enforcement
  - repo: https://gitlab.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: [
          "--max-line-length=88",
          "--extend-ignore=E203,W503,E501",
          "--max-complexity=10"
        ]

  # TRAILING-WHITESPACE - Remove trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  # MYPY - Static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests]
        args: ["--ignore-missing-imports", "--no-strict-optional"]

# ============================================================================
# CONFIGURATION NOTES
# ============================================================================
# - Black and isort are configured to work together
# - Flake8 ignores E203 (conflicts with black), W503 (line break before binary operator)
# - Max line length set to 88 characters (black default)
# - Additional hooks for general file cleanup and validation included
